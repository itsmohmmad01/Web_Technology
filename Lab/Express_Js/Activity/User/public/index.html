<!DOCTYPE html>
<html>
<head>
  <title>User System</title>
</head>
<body>

  <h1>User System</h1>

  <!-- REGISTER -->
  <h2>Register</h2>
  <form id="registerForm">
    <input type="text" id="regName" placeholder="Name" required><br>
    <input type="email" id="regEmail" placeholder="Email" required><br>
    <input type="password" id="regPassword" placeholder="Password" required><br>
    <button type="submit">Register</button>
  </form>

  <!-- LOGIN -->
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required><br>
    <input type="password" id="loginPassword" placeholder="Password" required><br>
    <button type="submit">Login</button>
  </form>

  <!-- USERS -->
  <h2>Users</h2>
  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

  <p id="message"></p>

  <script>
    const message = document.getElementById("message");
    const userTable = document.getElementById("userTable");

    const USER_API = "http://localhost:3000";
    const AUTH_API = "http://localhost:4000";

    // LOAD USERS
    async function loadUsers() {
      const res = await fetch(`${USER_API}/users`);
      const users = await res.json();

      userTable.innerHTML = "";

      users.forEach(user => {
        userTable.innerHTML += `
          <tr>
            <td>${user.id}</td>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>
              <button onclick="updateUser(${user.id})">Update</button>
              <button onclick="deleteUser(${user.id})">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    // REGISTER → User Server
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;

      const res = await fetch(`${USER_API}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      message.innerText = data.message;
      loadUsers();
    });

    // LOGIN → Auth Server
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      const res = await fetch(`${AUTH_API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      message.innerText = data.message;

      if (res.status === 200) {
        alert("Login Successful");
      }
    });

    // DELETE
    async function deleteUser(id) {
      await fetch(`${USER_API}/users/${id}`, {
        method: 'DELETE'
      });

      message.innerText = "User deleted";
      loadUsers();
    }

    // UPDATE
    async function updateUser(id) {
      const name = prompt("Enter new name:");
      const email = prompt("Enter new email:");

      if (!name || !email) return;

      await fetch(`${USER_API}/users/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email })
      });

      message.innerText = "User updated";
      loadUsers();
    }

    // INITIAL LOAD
    loadUsers();
  </script>

</body>
</html>
