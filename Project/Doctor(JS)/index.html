<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>🏥 Hospital Management System</h2>

    <!-- Tabs -->
    <div class="tabs">
        <button onclick="showTab('booking')">🧑‍⚕️ Book</button>
        <button onclick="showTab('list')">📋 Patients</button>
    </div>

    <!-- Booking -->
    <div id="booking" class="tabContent">
        <label>Doctor:</label>
        <select id="doctor" onchange="loadSlots()">
            <option value="">Select Doctor</option>
            <option value="dr1">Dr. Sharma</option>
            <option value="dr2">Dr. Khan</option>
            <option value="dr3">Dr. Patil</option>
        </select>

        <label>Time Slot:</label>
        <select id="slots"></select>

        <label>Patient Name:</label>
        <input type="text" id="name">

        <label>Age:</label>
        <input type="number" id="age">

        <button onclick="bookAppointment()">Book Appointment</button>
    </div>

    <!-- Patient List -->
    <div id="list" class="tabContent" style="display:none;">

        <!-- Dashboard -->
        <div class="dashboard">
            <div class="card total">Total: <span id="totalCount">0</span></div>
            <div class="card waiting">Waiting: <span id="waitingCount">0</span></div>
            <div class="card treatment">Treatment: <span id="treatmentCount">0</span></div>
            <div class="card completed">Completed: <span id="completedCount">0</span></div>
        </div>

        <!-- Search -->
        <input type="text" id="search" placeholder="Search patient..." onkeyup="searchPatient()">

        <div id="appointmentsList"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
