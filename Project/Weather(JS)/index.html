<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            margin-bottom: 15px;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            width: 85%;
            padding: 10px;
            background-color: #4facfe;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #00c6ff;
        }

        #result {
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Simple Weather App</h2>

        <input type="text" id="city" placeholder="Enter City Name">
        <button onclick="getWeather()">Get Weather</button>

        <h3 id="result"></h3>
    </div>

    <script src="script.js"></script>

</body>
</html>
